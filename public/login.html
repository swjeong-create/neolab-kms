<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoLab KMS - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f4f5f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { text-align: center; padding: 40px; }
        .login-card { background: white; border-radius: 16px; padding: 48px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        .logo-area { margin-bottom: 32px; }
        .logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #ff6720, #ff884d); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .logo-icon svg { width: 32px; height: 32px; color: white; }
        .logo-title { font-size: 28px; font-weight: 800; color: #1e293b; }
        .logo-subtitle { font-size: 14px; color: #53565A; margin-top: 4px; }
        .login-desc { font-size: 14px; color: #64748b; margin-bottom: 32px; line-height: 1.6; }
        .google-btn { display: inline-flex; align-items: center; gap: 12px; padding: 14px 32px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-weight: 600; color: #1e293b; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .google-btn:hover { border-color: #ff6720; box-shadow: 0 4px 12px rgba(255,103,32,0.15); transform: translateY(-2px); }
        .google-btn img { width: 20px; height: 20px; }
        .domain-info { margin-top: 24px; padding: 12px 16px; background: #fff7ed; border-radius: 8px; font-size: 12px; color: #9a3412; }
        .error-msg { margin-top: 16px; padding: 12px; background: #fef2f2; border-radius: 8px; font-size: 13px; color: #dc2626; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <div class="logo-title">NeoLab KMS</div>
                <div class="logo-subtitle">사내 지식포탈</div>
            </div>
            <p class="login-desc">사내 Google 계정으로 로그인하여<br>지식관리 시스템에 접속하세요.</p>
            <a href="/auth/google" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33.5 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.2-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.3 15.5 18.8 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.4 0-9.9-3.5-11.3-8.5l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.7 39.5 44 34 44 24c0-1.3-.2-2.7-.4-3.9z"/></svg>
                Google 계정으로 로그인
            </a>
            <div class="domain-info">@neolab.net 도메인 계정만 접속 가능합니다</div>
            <div class="error-msg" id="errorMsg">인증에 실패했습니다. 회사 계정으로 다시 시도해주세요.</div>
        </div>
    </div>
    <script>
        if (window.location.search.includes('error=auth_failed')) {
            document.getElementById('errorMsg').style.display = 'block';
        }
    </script>
</body>
</html>
